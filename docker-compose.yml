services:
  ollama:
    image: ollama/ollama:latest
    container_name: ally-ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama


  api-server:
    build: ./api
    container_name: ally-api
    ports:
      - "8000:8000"
    environment:
      OLLAMA_URL: http://ollama:11434
      API_KEY: api-key-placeholder
      OLLAMA_MODEL: granite4
      MAX_CONTEXT_LEN: 8192
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /root/.cache/huggingface
      TORCH_HOME: /root/.cache/torch
    volumes:
      - ./api:/app
      - whisperx_models:/root/.cache/huggingface
      - torch_models:/root/.cache/torch
    depends_on:
      - ollama

volumes:
  ollama_data:
  whisperx_models:
  torch_models: